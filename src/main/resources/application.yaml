spring:
  application:
    name: predictive.backend
  datasource:
    # [설명] Aiven 클라우드 DB 접속 주소입니다.
    # 💡 로컬/도커 실행 시 'DB_URL' 환경 변수를 주지 않으면 기본값(jdbc:mysql://...)이 사용됩니다.
    url: ${DB_URL:jdbc:mysql://mysql-35417ff9-predictive-factory-db.e.aivencloud.com:22411/amhs_db?sslMode=REQUIRED}

    # [설명] DB 접속 아이디입니다. 기본값은 avnadmin입니다.
    username: ${DB_USERNAME:avnadmin}

    # [설명] 🔐 DB 접속 비밀번호
    # -------------------------------------------------------------------------
    # ✅ 1. 로컬(IntelliJ) 실행 시:
    #    상단 [Edit Configurations] -> [Environment variables] 칸에
    #    DB_PASSWORD=실제비밀번호  형식으로 입력하세요.
    #
    # ✅ 2. 도커(Docker) 실행 시 명령어 순서:
    #    .\gradlew.bat clean build -x test
    #    docker build -t predictive-server .
    #    docker run -d -p 8080:8080 -e DB_PASSWORD=실제비밀번호 predictive-server
    # -------------------------------------------------------------------------
    password: ${DB_PASSWORD}

    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # [설명] 서버가 켜질 때 Entity 클래스를 보고 DB 테이블을 자동으로 생성/수정합니다.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        # [설명] MySQL 8 버전에 맞는 문법을 사용하도록 설정합니다.
        dialect: org.hibernate.dialect.MySQLDialect

auth:
  jwt-secret: your-very-secret-key-your-very-secret-key
  jwt-expiration-ms: 3600000
